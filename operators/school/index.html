<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK School Finder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <h1>UK School Finder</h1>
    <p>Enter your child's age to find out which school they should attend.</p>

    <input type="number" id="ageInput" placeholder="Enter age" min="0" max="100" />
     <button onclick="findSchool()">Find School</button>

    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
